services:
  mongo:
    image: mongo:7
    container_name: web1-mongo
    restart: unless-stopped
    ports:
      - "${MONGO_PORT:-26712}:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - web1net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: web1-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-26379}:6379"
    volumes:
      - redis-data:/data
    networks:
      - web1net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backup:
    build:
      context: ./backup
    container_name: web1-backup
    restart: unless-stopped
    environment:
      MONGO_URI: mongodb://mongo:27017/web1
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-7}
      BACKUP_INTERVAL_SECONDS: ${BACKUP_INTERVAL_SECONDS:-86400}
    volumes:
      - ./backups:/backups
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - web1net

  backend:
    build:
      context: ./backend
    container_name: web1-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    ports:
      - "${BACKEND_PORT:-5674}:5674"
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - web1net

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-}
    container_name: web1-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3671}:80"
    depends_on:
      - backend
    networks:
      - web1net

volumes:
  mongo-data:
  redis-data:

networks:
  web1net:
    driver: bridge

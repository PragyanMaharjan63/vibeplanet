services:
  mongo:
    image: mongo:7
    container_name: web1-mongo
    restart: unless-stopped
    ports:
      - "${MONGO_PORT:-26712}:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - web1net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: web1-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    ports:
      - "${BACKEND_PORT:-5674}:5674"
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - web1net

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-}
    container_name: web1-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3671}:80"
    depends_on:
      - backend
    networks:
      - web1net

volumes:
  mongo-data:

networks:
  web1net:
    driver: bridge
